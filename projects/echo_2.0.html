<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="../icon/favicon/favicon-32x32.png?v=2">
    <link rel="icon" type="image/png" sizes="16x16" href="../icon/favicon/favicon-16x16.png?v=2">
    <link rel="apple-touch-icon" sizes="180x180" href="../icon/favicon/apple-touch-icon.png?v=2">

    <!-- Структурированные данные JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "ECHO 2.0",
      "description": "ECHO 2.0 project by UNIVERSE DESIGN — media visuals with GIF sequences and Vimeo video.",
      "mainEntity": {
        "@type": "VideoObject",
        "name": "ECHO 2.0 — Moscow",
        "description": "Vimeo video embed for the ECHO 2.0 project.",
        "embedUrl": "https://player.vimeo.com/video/1175295865",
        "thumbnailUrl": "https://universe-design.com/projects/echo_2.0/gallery/image1.jpg"
      },
      "creator": {
        "@type": "Organization",
        "name": "UNIVERSE DESIGN",
        "url": "https://universe-design.com"
      },
      "image": "https://universe-design.com/projects/echo_2.0/gallery/image1.jpg",
      "url": "https://universe-design.com/projects/echo_2.0.html",
      "publisher": {
        "@type": "Organization",
        "name": "UNIVERSE DESIGN",
        "logo": {
          "@type": "ImageObject",
          "url": "https://universe-design.com/logo/UNIVERSE.png"
        }
      }
    }
    </script>

    <title>UNIVERSE DESIGN | ECHO 2.0</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../projects/projects.css">
    <script src="https://player.vimeo.com/api/player.js"></script>
    <style>
        @media (max-width: 767px) {
            .echo-vimeo-portrait {
                padding-bottom: 177.78%;
            }
        }
    </style>
</head>
<body>
    <div class="logo-text">
        <img src="../logo/UNIVERSE.png" alt="UNIVERSE DESIGN Studio Logo">
    </div>

    <div class="project-content">
        <div class="project-gallery">
            <!-- Первое изображение на всю ширину -->
            <div class="gallery-item full-width">
                <img
                    src="echo_2.0/gallery/image1.jpg"
                    alt="ECHO 2.0 - Main visual"
                    loading="lazy"
                >
            </div>

            <!-- Vimeo плеер -->
            <div class="vimeo-container echo-vimeo-portrait">
                <iframe
                    src="https://player.vimeo.com/video/1175295865?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479&amp;autoplay=1&amp;loop=1"
                    frameborder="0"
                    allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"
                    referrerpolicy="strict-origin-when-cross-origin"
                    title="ECHO 2.0   Moscow"
                    allowfullscreen
                ></iframe>
            </div>

            <!-- GIF (3 в строке) -->
            <div class="gallery-row gif-row">
                <div class="gallery-item">
                    <img src="echo_2.0/gallery/gif1.gif" alt="ECHO 2.0 - GIF 1">
                </div>
                <div class="gallery-item">
                    <img src="echo_2.0/gallery/gif2.gif" alt="ECHO 2.0 - GIF 2">
                </div>
                <div class="gallery-item">
                    <img src="echo_2.0/gallery/gif3.gif" alt="ECHO 2.0 - GIF 3">
                </div>
            </div>

            <!-- GIF (1 в строке) -->
            <div class="gallery-row gif-row">
                <div class="gallery-item">
                    <img src="echo_2.0/gallery/gif4.gif" alt="ECHO 2.0 - GIF 4">
                </div>
            </div>

            <!-- Остальные изображения (пары) -->
            <div class="gallery-row">
                <div class="gallery-item">
                    <img src="echo_2.0/gallery/image2.jpg" alt="ECHO 2.0 - Image 2" loading="lazy">
                </div>
                <div class="gallery-item">
                    <img src="echo_2.0/gallery/image3.jpg" alt="ECHO 2.0 - Image 3" loading="lazy">
                </div>
            </div>

            <div class="gallery-row">
                <div class="gallery-item">
                    <img src="echo_2.0/gallery/image4.jpg" alt="ECHO 2.0 - Image 4" loading="lazy">
                </div>
                <div class="gallery-item">
                    <img src="echo_2.0/gallery/image5.jpg" alt="ECHO 2.0 - Image 5" loading="lazy">
                </div>
            </div>

            <div class="gallery-row">
                <div class="gallery-item">
                    <img src="echo_2.0/gallery/image6.jpg" alt="ECHO 2.0 - Image 6" loading="lazy">
                </div>
                <div class="gallery-item">
                    <img src="echo_2.0/gallery/image7.jpg" alt="ECHO 2.0 - Image 7" loading="lazy">
                </div>
            </div>

            <div class="gallery-row">
                <div class="gallery-item">
                    <img src="echo_2.0/gallery/image8.jpg" alt="ECHO 2.0 - Image 8" loading="lazy">
                </div>
                <div class="gallery-item">
                    <img src="echo_2.0/gallery/image9.jpg" alt="ECHO 2.0 - Image 9" loading="lazy">
                </div>
            </div>

            <div class="gallery-row">
                <div class="gallery-item">
                    <img src="echo_2.0/gallery/image10.jpg" alt="ECHO 2.0 - Image 10" loading="lazy">
                </div>
                <div class="gallery-item">
                    <img src="echo_2.0/gallery/image11.jpg" alt="ECHO 2.0 - Image 11" loading="lazy">
                </div>
            </div>

            <div class="gallery-row">
                <div class="gallery-item">
                    <img src="echo_2.0/gallery/image12.jpg" alt="ECHO 2.0 - Image 12" loading="lazy">
                </div>
                <div class="gallery-item">
                    <img src="echo_2.0/gallery/image13.jpg" alt="ECHO 2.0 - Image 13" loading="lazy">
                </div>
            </div>
        </div>
    </div>

    <!-- Полноэкранный просмотр -->
    <div class="fullscreen-view">
        <div class="fullscreen-content">
            <div class="fullscreen-media"></div>
            <button class="close-fullscreen">×</button>
            <button class="nav-button prev-button"></button>
            <button class="nav-button next-button"></button>
        </div>
    </div>

    <button class="back-button"></button>

    <script src="project-gallery.js"></script>
</body>
</html>
