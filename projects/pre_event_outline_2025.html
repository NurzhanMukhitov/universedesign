    <!-- Полноэкранный просмотр -->
    <div class="fullscreen-view">
        <div class="fullscreen-content">
            <div class="fullscreen-media">
                <img src="" alt="Fullscreen view">
            </div>
        </div>
        <button class="close-fullscreen">×</button>
        <button class="nav-button prev-button"></button>
        <button class="nav-button next-button"></button>
    </div>

    <button class="back-button" onclick="window.location.href = '../projects.html'"></button>

    <script>
        // Получаем все изображения в галерее
        const galleryImages = document.querySelectorAll('.gallery-item img');
        const fullscreenView = document.querySelector('.fullscreen-view');
        const fullscreenImage = fullscreenView.querySelector('img');
        const closeFullscreen = document.querySelector('.close-fullscreen');
        const prevButton = document.querySelector('.prev-button');
        const nextButton = document.querySelector('.next-button');
        
        let currentImageIndex = 0;
        const images = Array.from(galleryImages);

        // Открываем полноэкранный просмотр
        galleryImages.forEach((img, index) => {
            img.addEventListener('click', () => {
                currentImageIndex = index;
                fullscreenImage.src = img.src;
                fullscreenView.classList.add('active');
            });
        });

        // Закрываем полноэкранный просмотр
        closeFullscreen.addEventListener('click', () => {
            fullscreenView.classList.remove('active');
        });

        // Навигация по изображениям
        function showImage(index) {
            if (index >= 0 && index < images.length) {
                currentImageIndex = index;
                fullscreenImage.src = images[currentImageIndex].src;
            }
        }

        prevButton.addEventListener('click', () => {
            showImage(currentImageIndex - 1);
        });

        nextButton.addEventListener('click', () => {
            showImage(currentImageIndex + 1);
        });

        // Закрытие по клику вне изображения
        fullscreenView.addEventListener('click', (e) => {
            if (e.target === fullscreenView) {
                fullscreenView.classList.remove('active');
            }
        });

        // Закрытие по клавише Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && fullscreenView.classList.contains('active')) {
                fullscreenView.classList.remove('active');
            }
        });

        // Навигация по стрелкам
        document.addEventListener('keydown', (e) => {
            if (fullscreenView.classList.contains('active')) {
                if (e.key === 'ArrowLeft') {
                    showImage(currentImageIndex - 1);
                } else if (e.key === 'ArrowRight') {
                    showImage(currentImageIndex + 1);
                }
            }
        });

        // Показываем логотип при загрузке страницы
        document.addEventListener('DOMContentLoaded', function() {
            const logoText = document.querySelector('.logo-text');
            setTimeout(() => {
                logoText.style.display = "block";
                requestAnimationFrame(() => {
                    logoText.classList.add('visible');
                });
            }, 100);
        });
    </script>
</body>
</html>
