<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Адаптивность -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>UNIVERSEDESIGN - Adaptive Cube with Touch</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>  
</head>
<body>
  <canvas id="c"></canvas>
  <div class="menu">
    <div class="menu-btn">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
  <!-- Логотип вынесен отдельно, чтобы всегда быть в правом верхнем углу -->
  <div class="logo-text">
    <img src="logo/UNIVERSE.png" alt="UNIVERSE design">
  </div>
  <div class="overlay-menu">
    <ul>
      <li><a data-section="projects">PROJECTS</a></li>
      <li><a data-section="ledpulse">UNIVERSE х LedPulse</a></li>
      <li><a data-section="about">ABOUT</a></li>
      <li><a data-section="contacts">CONTACTS</a></li>
    </ul>

  <div class="overlay-mask"></div>
  <div class="popup-block" id="about">
    <div class="popup-content">
      <p>We are a design studio passionate about technology research, media art, and installation/exhibition design.</p>
    </div>
  </div>
  <div class="popup-block" id="contacts">
    <div class="popup-content">
      <div class="social-icons">
        <a href="https://www.behance.net/dimahoc" target="_blank">
          <img src="logo/behance.png" alt="Behance">
        </a>
        <a href="https://www.instagram.com/universe_design_studio" target="_blank">
          <img src="logo/instagram.png" alt="Instagram">
        </a>
      </div>
    </div>
  </div>
  <div class="popup-block" id="projects">
    <div class="popup-content">
      <div class="projects-grid">
        <div class="project-item">
          <picture>
            <img src="projects/project_1/covers/cover.jpg" 
                 loading="lazy"
                 class="project-cover"
                 width="640"

        </div>
        <div class="project-item">

            <img src="projects/project_2/covers/cover.jpg"

                 width="640"

            <img src="projects/project_4/covers/cover.jpg"

        </div>

            <img src="projects/project_6/covers/cover.jpg" 
                 loading="lazy"
                 class="project-cover"
                 width="640" 
                 height="360">
          </picture>
        </div>

    </div>

      <p>UNIVERSE х LedPulse</p>
